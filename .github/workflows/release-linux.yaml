name: Release Linux App
run-name: ${{ github.event.release.tag_name || github.event.inputs.tag }}

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag'
        required: true
        default: '1.0.0'

jobs:
  release:
    name: Release Linux (${{ matrix.arch }}, webkit2gtk-${{ matrix.webkit }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # WebKit2GTK 4.0 (Ubuntu 22.04) - amd64
          - runner: ubuntu-22.04
            arch: amd64
            platform: linux/amd64
            deb_arch: amd64
            appimage_arch: x86_64
            webkit: "4.0"
            webkit_dev: libwebkit2gtk-4.0-dev
            webkit_dep: libwebkit2gtk-4.0-37
            build_tags: ""
            suffix: ""
            appimage: true
            cross_compile: false
          # WebKit2GTK 4.1 (Ubuntu 24.04) - amd64
          - runner: ubuntu-24.04
            arch: amd64
            platform: linux/amd64
            deb_arch: amd64
            appimage_arch: x86_64
            webkit: "4.1"
            webkit_dev: libwebkit2gtk-4.1-dev
            webkit_dep: libwebkit2gtk-4.1-0
            build_tags: "-tags webkit2_41"
            suffix: "_webkit2_41"
            appimage: false
            cross_compile: false
          # WebKit2GTK 4.1 (Ubuntu 24.04) - arm64
          - runner: ubuntu-24.04
            arch: arm64
            platform: linux/arm64
            deb_arch: arm64
            appimage_arch: aarch64
            webkit: "4.1"
            webkit_dev: libwebkit2gtk-4.1-dev
            webkit_dep: libwebkit2gtk-4.1-0
            build_tags: "-tags webkit2_41"
            suffix: "_webkit2_41"
            appimage: false
            cross_compile: true

    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Normalise version tag
        id: normalise_version
        shell: bash
        run: |
          if [ "${{ github.event.release.tag_name }}" == "" ]; then
            version=$(echo ${{ github.event.inputs.tag }} | sed -e 's/v//g')
          else
            version=$(echo ${{ github.event.release.tag_name }} | sed -e 's/v//g')
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Install wails
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install native build prerequisites
        if: ${{ !matrix.cross_compile }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev ${{ matrix.webkit_dev }} libfuse-dev libfuse2

      - name: Install cross-compile prerequisites (arm64)
        if: ${{ matrix.cross_compile }}
        shell: bash
        run: |
          sudo dpkg --add-architecture arm64

          # Restrict existing Ubuntu sources to amd64 only (skip third-party .list files)
          if [ -f /etc/apt/sources.list ]; then
            sudo sed -i 's/^deb http/deb [arch=amd64] http/g' /etc/apt/sources.list
          fi
          for f in /etc/apt/sources.list.d/ubuntu*.list; do
            [ -f "$f" ] && sudo sed -i 's/^deb http/deb [arch=amd64] http/g' "$f"
          done

          # Handle DEB822 format (.sources files) used by Ubuntu 24.04
          for f in /etc/apt/sources.list.d/ubuntu*.sources; do
            if [ -f "$f" ]; then
              sudo sed -i '/^Architectures:/d' "$f"
              sudo sed -i '/^Types:/a Architectures: amd64' "$f"
            fi
          done

          # Add arm64 sources
          echo "deb [arch=arm64] http://ports.ubuntu.com/ $(lsb_release -cs) main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ $(lsb_release -cs)-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list

          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            pkg-config \
            libgtk-3-dev:arm64 \
            ${{ matrix.webkit_dev }}:arm64

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Build frontend assets
        shell: bash
        run: |
          npm install -g npm@9
          jq '.info.productVersion = "${{ steps.normalise_version.outputs.version }}"' wails.json > tmp.json
          mv tmp.json wails.json
          cd frontend
          jq '.version = "${{ steps.normalise_version.outputs.version }}"' package.json > tmp.json
          mv tmp.json package.json
          npm install

      - name: Build wails app (native)
        if: ${{ !matrix.cross_compile }}
        shell: bash
        run: |
          CGO_ENABLED=1 wails build -platform ${{ matrix.platform }} \
          ${{ matrix.build_tags }} \
          -ldflags "-X main.version=v${{ steps.normalise_version.outputs.version }} -X main.gaMeasurementID=${{ secrets.GA_MEASUREMENT_ID }} -X main.gaSecretKey=${{ secrets.LINUX_GA_SECRET }}" \
          -o tiny-rdm

      - name: Build wails app (cross-compile arm64)
        if: ${{ matrix.cross_compile }}
        shell: bash
        run: |
          # Generate bindings using native Go (no CGO needed for this step)
          CGO_ENABLED=0 wails generate bindings
          # Build frontend
          cd frontend && npm run build && cd ..

      - name: Build wails app (cross-compile arm64 - compile)
        if: ${{ matrix.cross_compile }}
        shell: bash
        env:
          CC: aarch64-linux-gnu-gcc
          CXX: aarch64-linux-gnu-g++
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 wails build -platform ${{ matrix.platform }} \
          ${{ matrix.build_tags }} \
          -ldflags "-X main.version=v${{ steps.normalise_version.outputs.version }} -X main.gaMeasurementID=${{ secrets.GA_MEASUREMENT_ID }} -X main.gaSecretKey=${{ secrets.LINUX_GA_SECRET }}" \
          -skipbindings -s -o tiny-rdm

      - name: Prepare deb template
        shell: bash
        run: |
          template_dir="build/linux/tiny-rdm_0.0.0_amd64"
          work_dir="build/linux/tiny-rdm_${{ steps.normalise_version.outputs.version }}_${{ matrix.deb_arch }}"
          cp -r "$template_dir" "$work_dir"

          # Fill control template
          name=$(jq -r '.name' wails.json | tr -d ' ' | tr '[:upper:]' '[:lower:]')
          sed -i "s/{{.Name}}/$name/g" "$work_dir/DEBIAN/control"
          sed -i "s/{{.Info.ProductVersion}}/${{ steps.normalise_version.outputs.version }}/g" "$work_dir/DEBIAN/control"
          sed -i "s/{{.Author.Name}}/$(jq -r '.author.name' wails.json)/g" "$work_dir/DEBIAN/control"
          sed -i "s/{{.Author.Email}}/$(jq -r '.author.email' wails.json)/g" "$work_dir/DEBIAN/control"
          sed -i "s/{{.Info.Comments}}/$(jq -r '.info.comments' wails.json)/g" "$work_dir/DEBIAN/control"
          sed -i "s/{{.libwebkit2gtk.PackageName}}/${{ matrix.webkit_dep }}/g" "$work_dir/DEBIAN/control"
          sed -i "s/Architecture: amd64/Architecture: ${{ matrix.deb_arch }}/g" "$work_dir/DEBIAN/control"

          # Fill desktop template
          sed -i "s/{{.Info.ProductName}}/$(jq -r '.info.productName' wails.json)/g" "$work_dir/usr/share/applications/tiny-rdm.desktop"
          sed -i "s/{{.Info.Comments}}/$(jq -r '.info.comments' wails.json)/g" "$work_dir/usr/share/applications/tiny-rdm.desktop"

      - name: Package deb
        shell: bash
        run: |
          work_dir="build/linux/tiny-rdm_${{ steps.normalise_version.outputs.version }}_${{ matrix.deb_arch }}"
          mv build/bin/tiny-rdm "$work_dir/usr/local/bin/"
          cd build/linux
          dpkg-deb --build -Zxz "tiny-rdm_${{ steps.normalise_version.outputs.version }}_${{ matrix.deb_arch }}"
          mv "tiny-rdm_${{ steps.normalise_version.outputs.version }}_${{ matrix.deb_arch }}.deb" \
             "tiny-rdm_${{ steps.normalise_version.outputs.version }}_linux_${{ matrix.deb_arch }}${{ matrix.suffix }}.deb"

      - name: Package AppImage
        if: ${{ matrix.appimage }}
        run: |
          curl -L -o linuxdeploy \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20240109-1/linuxdeploy-${{ matrix.appimage_arch }}.AppImage
          chmod u+x linuxdeploy

          ./linuxdeploy --appdir AppDir

          pushd AppDir
          find /usr/lib* -name WebKitNetworkProcess -exec mkdir -p $(dirname '{}') \; -exec cp --parents '{}' "." \; || true
          find /usr/lib* -name WebKitWebProcess -exec mkdir -p $(dirname '{}') \; -exec cp --parents '{}' "." \; || true
          find /usr/lib* -name libwebkit2gtkinjectedbundle.so -exec mkdir -p $(dirname '{}') \; -exec cp --parents '{}' "." \; || true
          popd

          work_dir="build/linux/tiny-rdm_${{ steps.normalise_version.outputs.version }}_${{ matrix.deb_arch }}"

          mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps
          cp -r $work_dir/usr/share/icons/hicolor/512x512/apps/tiny-rdm.png AppDir/usr/share/icons/hicolor/512x512/apps/
          cp $work_dir/usr/local/bin/tiny-rdm AppDir/usr/bin/

          sed -i 's#/usr/local/bin/tiny-rdm#tiny-rdm#g' $work_dir/usr/share/applications/tiny-rdm.desktop

          curl -o linuxdeploy-plugin-gtk.sh \
            "https://raw.githubusercontent.com/tauri-apps/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh"
          sed -i '/XDG_DATA_DIRS/a export WEBKIT_DISABLE_COMPOSITING_MODE=1' linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy-plugin-gtk.sh

          curl -L -o AppDir/AppRun \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/AppRun-${{ matrix.appimage_arch }}

          ./linuxdeploy --appdir AppDir \
             --output=appimage \
             --plugin=gtk \
             -e $work_dir/usr/local/bin/tiny-rdm \
             -d $work_dir/usr/share/applications/tiny-rdm.desktop

          mv Tiny_RDM-${{ matrix.appimage_arch }}.AppImage \
             "tiny-rdm_${{ steps.normalise_version.outputs.version }}_linux_${{ matrix.deb_arch }}.AppImage"

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.normalise_version.outputs.version }}
          files: |
            ./build/linux/tiny-rdm_${{ steps.normalise_version.outputs.version }}_linux_${{ matrix.deb_arch }}${{ matrix.suffix }}.deb
            tiny-rdm_${{ steps.normalise_version.outputs.version }}_linux_${{ matrix.deb_arch }}.AppImage
          token: ${{ secrets.GITHUB_TOKEN }}
